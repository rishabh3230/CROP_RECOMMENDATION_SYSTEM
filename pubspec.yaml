name: agro_intelligence
description: AgroMind - AI-powered crop intelligence app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Location & GPS
  geolocator: ^13.0.1
  geocoding: ^2.1.1
  
  # HTTP & Networking
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  intl: ^0.18.1
  google_fonts: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts & Visualization
  fl_chart: ^0.67.0
  
  # UI Components
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
